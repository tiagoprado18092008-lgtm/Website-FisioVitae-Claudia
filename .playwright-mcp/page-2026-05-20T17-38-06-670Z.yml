        - generic [ref=e401]: Não é obrigatória. Se tiver exames auxiliares (ressonâncias, ecografias) ou indicação médica, pedimos que os traga — ajudam-nos a personalizar o plano de tratamento desde o início.
      - generic [ref=e402]:
        - button "Quantas sessões são normalmente necessárias?" [ref=e403] [cursor=pointer]:
          - text: Quantas sessões são normalmente necessárias?
          - img [ref=e404]
        - generic [ref=e406]: Depende da condição. Lesões agudas podem resolver-se em 4–8 sessões; condições crónicas requerem acompanhamento mais prolongado. Na primeira consulta definimos sempre um plano realista e honesto.
      - generic [ref=e407]:
        - button "O Pilates Clínico é diferente do Pilates normal?" [ref=e408] [cursor=pointer]:
          - text: O Pilates Clínico é diferente do Pilates normal?
          - img [ref=e409]
        - generic [ref=e411]: Sim, significativamente. É supervisionado por um profissional de saúde, com exercícios prescritos especificamente para a sua condição — não é uma aula de grupo genérica. É reabilitação e prevenção.
      - generic [ref=e412]:
        - button "A fisioterapia percutânea é dolorosa?" [ref=e413] [cursor=pointer]:
          - text: A fisioterapia percutânea é dolorosa?
          - img [ref=e414]
        - generic [ref=e416]: A maioria dos pacientes descreve apenas uma sensação de pressão suave. Usamos agulhas muito finas com o conforto do paciente como prioridade. É normal uma ligeira sensibilidade local nas 24–48h seguintes.
      - generic [ref=e417]:
        - button "A clínica tem estacionamento?" [ref=e418] [cursor=pointer]:
          - text: A clínica tem estacionamento?
          - img [ref=e419]
        - generic [ref=e421]: Sim, existe estacionamento gratuito nas imediações da Rua Nova de Agrafonte. Se tiver dificuldade, ligue-nos e orientamo-lo de imediato.
      - generic [ref=e422]:
