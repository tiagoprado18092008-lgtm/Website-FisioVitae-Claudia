          - generic [ref=e50]:
            - generic [ref=e51]: "2"
            - generic [ref=e52]:
              - strong [ref=e53]: "Precisão máxima:"
              - text: Visualização em tempo real evita estruturas vasculares e nervosas adjacentes.
          - generic [ref=e54]:
            - generic [ref=e55]: "3"
            - generic [ref=e56]:
