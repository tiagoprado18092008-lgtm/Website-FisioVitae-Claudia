      - generic [ref=e36]: Ecografia em tempo real
    - generic [ref=e37]:
      - paragraph [ref=e38]: A fisioterapia ecoguiada representa o estado da arte no tratamento de lesões músculo-esqueléticas — guiada por ecografia em tempo real, permite uma precisão cirúrgica que outras técnicas não conseguem igualar.
      - paragraph [ref=e39]:
        - text: Através de um ecógrafo de alta resolução, o terapeuta consegue
        - strong [ref=e40]: visualizar em tempo real
        - text: as estruturas internas — tendões, músculos, bolsas sinoviais, nervos — e orientar as agulhas ou outros instrumentos com precisão milimétrica.
      - paragraph [ref=e41]:
        - text: Esta abordagem é particularmente valiosa em
        - strong [ref=e42]: zonas de difícil acesso anatómico
        - text: ", em estruturas profundas e em situações em que a palpação manual não é suficientemente precisa para garantir a segurança e eficácia do tratamento."
      - generic [ref=e43]:
        - heading "Vantagens da abordagem ecoguiada" [level=4] [ref=e44]
        - generic [ref=e45]:
