        - heading "De Carro" [level=3] [ref=e192]
        - paragraph [ref=e193]: A clínica está localizada na Rua Nova de Agrafonte, n.º 31, em Panóias. Existe estacionamento gratuito na via pública nas imediações da clínica. Recomendamos a utilização do GPS com a morada indicada.
      - generic [ref=e194]:
        - img [ref=e196]
        - heading "Transportes Públicos" [level=3] [ref=e199]
        - paragraph [ref=e200]: Existem autocarros da rede TUB (Transportes Urbanos de Braga) com paragem próxima da clínica. Consulte os horários e percursos no site da TUB. A paragem mais próxima fica a cerca de 5 minutos a pé.
      - generic [ref=e201]:
        - img [ref=e203]
        - heading "Referências Locais" [level=3] [ref=e206]
        - paragraph [ref=e207]: A clínica está situada em Panóias, a poucos minutos do centro de Braga. Se tiver dificuldade em localizar, ligue para 253 623 663 — a nossa equipa dá indicações precisas de forma imediata.
