    - generic [ref=e214]:
      - generic [ref=e215]:
        - button "Quanto tempo demora a primeira consulta?" [ref=e216] [cursor=pointer]:
          - text: Quanto tempo demora a primeira consulta?
          - img [ref=e217]
        - generic [ref=e219]: A primeira consulta inclui uma avaliação completa e costuma demorar entre 45 a 60 minutos. As sessões seguintes têm normalmente 30 a 45 minutos, dependendo do serviço. O Pilates Clínico tem sessões de 50–60 minutos.
      - generic [ref=e220]:
        - button "Posso cancelar ou remarcar a minha consulta?" [ref=e221] [cursor=pointer]:
          - text: Posso cancelar ou remarcar a minha consulta?
          - img [ref=e222]
        - generic [ref=e224]: Sim. Pedimos que qualquer cancelamento ou remarcação seja feito com pelo menos 24 horas de antecedência, para que possamos disponibilizar o horário a outros pacientes. Pode cancelar por telefone, email ou WhatsApp.
      - generic [ref=e225]:
        - button "A consulta é coberta pelo subsistema de saúde?" [ref=e226] [cursor=pointer]:
          - text: A consulta é coberta pelo subsistema de saúde?
          - img [ref=e227]
        - generic [ref=e229]: A Fisio Vitae trabalha com vários subsistemas de saúde e seguros. Para confirmar a cobertura do seu plano específico, contacte-nos antes da consulta. Emitimos sempre recibo que pode submeter ao seu subsistema para reembolso.
      - generic [ref=e230]:
        - button "O que devo trazer para a primeira consulta?" [ref=e231] [cursor=pointer]:
          - text: O que devo trazer para a primeira consulta?
          - img [ref=e232]
        - generic [ref=e234]: "Recomendamos que traga: cartão de identificação, cartão de saúde, e qualquer exame auxiliar de diagnóstico relevante (ressonâncias magnéticas, ecografias, análises). Se tiver relatório médico ou indicação, traga também. Vista roupa confortável que permita acesso à zona a tratar."
      - generic [ref=e235]:
        - button "Qual o prazo de espera para marcação?" [ref=e236] [cursor=pointer]:
          - text: Qual o prazo de espera para marcação?
          - img [ref=e237]
        - generic [ref=e239]: Normalmente conseguimos marcação em 2–5 dias úteis. Em períodos de maior procura pode ser ligeiramente mais, mas contactamos sempre assim que exista disponibilidade. Para urgências, recomendamos que ligue diretamente.
